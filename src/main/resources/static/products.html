<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Товари</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Каталог товарів</h1>
                    <p>Перегляд та управління асортиментом</p>
                </div>
                <div class="header-actions animate">
                    <a href="create-product.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Додати товар
                    </a>
                </div>
            </header>

            <div class="grid" id="products-grid">
                <!-- Картки товарів завантажуються через app.js -->
                <p class="animate">Завантаження товарів...</p>
            </div>

            <footer class="main-footer animate">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
                <div class="footer-links">
                    <a href="about.html">Про проект</a>
                    <a href="contacts.html">Контакти</a>
                </div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
