<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Додати товар</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Додати новий товар</h1>
                    <p>Заповніть інформацію про продукт</p>
                </div>
                <div class="header-actions animate">
                    <a href="products.html" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> Назад до каталогу
                    </a>
                </div>
            </header>

            <div class="form-container animate">
                <form id="create-product-form">
                    <div class="form-group">
                        <label for="title">Назва товару</label>
                        <input type="text" id="title" name="title" placeholder="Напр. iPhone 15 Pro" required>
                    </div>
                    <div class="grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="form-group">
                            <label for="price">Ціна (₴)</label>
                            <input type="number" id="price" name="price" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Категорія</label>
                            <select id="category" name="category">
                                <option value="Електроніка">Електроніка</option>
                                <option value="Аксесуари">Аксесуари</option>
                                <option value="Побутова техніка">Побутова техніка</option>
                                <option value="Інше">Інше</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Опис</label>
                        <textarea id="description" name="description" rows="4" placeholder="Опис товару..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i class="fas fa-check"></i> Зберегти товар
                    </button>
                </form>
            </div>

            <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted);">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан </p>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
