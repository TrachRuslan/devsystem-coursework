<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Вхід</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>
    <div class="login-card animate">
        <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
            <i class="fas fa-terminal"></i>
            <span>DevSystem</span>
        </div>
        <h2 class="text-center" style="margin-bottom: 0.5rem;">Вітаємо знову!</h2>
        <p class="text-center" style="color: var(--text-muted); margin-bottom: 2rem;">Будь ласка, увійдіть у свій акаунт</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email адреса</label>
                <input type="email" placeholder="admin@example.com" required value="admin@example.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" placeholder="••••••••" required value="admin123">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">
                    <input type="checkbox" style="width: auto;"> Запам'ятати мене
                </label>
                <a href="#" style="font-size: 0.85rem; color: var(--primary);">Забули пароль?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Увійти</button>
        </form>
        
        <p class="text-center" style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Немає акаунту? <a href="#" style="color: var(--primary); font-weight: 600;">Зареєструватися</a>
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showNotification('Вхід успішний! Перенаправлення...');
            setTimeout(() => window.location.href = 'index.html', 1000);
        });
    </script>
</body>
</html>
