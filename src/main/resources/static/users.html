<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Користувачі</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Керування користувачами</h1>
                    <p>Список зареєстрованих клієнтів у вашій системі</p>
                </div>
                <div class="header-actions animate">
                    <a href="create-user.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Створити користувача
                    </a>
                </div>
            </header>

            <div class="table-container animate">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ім'я</th>
                            <th>Email</th>
                            <th>Телефон</th>
                            <th>Вік</th>
                            <th>Дії</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <!-- Дані завантажуються через app.js -->
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                                <i class="fas fa-spinner fa-spin"></i> Завантаження даних...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted);">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
