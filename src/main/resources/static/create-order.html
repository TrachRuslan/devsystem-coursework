<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Створити замовлення | Система управління</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>

    <div class="main-wrapper">
        <header>
            <div class="page-title">
                <h1>Нове замовлення</h1>
                <p>Додавання замовлення для обраного користувача</p>
            </div>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form id="createOrderForm">
                <div class="form-group">
                    <label for="userSelect">Оберіть користувача</label>
                    <select id="userSelect" required>
                        <option value="">Завантаження користувачів...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="orderTitle">Назва товару/послуги</label>
                    <input type="text" id="orderTitle" placeholder="Наприклад: Ноутбук Dell" required>
                </div>
                <div class="form-group">
                    <label for="orderPrice">Ціна (грн)</label>
                    <input type="number" step="0.01" id="orderPrice" placeholder="0.00" required>
                </div>
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-success" style="width: 100%; justify-content: center;">
                        <i class="fas fa-plus-circle"></i> Створити замовлення
                    </button>
                </div>
            </form>
        </div>

        <footer>
            <p>&copy; 2026 Система управління | Курсова робота</p>
        </footer>
    </div>

    <div id="notification"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const users = await fetchData('/users');
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">-- Оберіть клієнта --</option>';
            
            if (users) {
                users.forEach(user => {
                    const opt = document.createElement('option');
                    opt.value = user.id;
                    opt.textContent = `${user.name} (ID: ${user.id})`;
                    select.appendChild(opt);
                });
            }

            // Якщо ID передано в URL
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('userId')) {
                select.value = urlParams.get('userId');
            }
        });

        document.getElementById('createOrderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('userSelect').value;
            const orderData = {
                title: document.getElementById('orderTitle').value,
                price: parseFloat(document.getElementById('orderPrice').value)
            };
            
            const result = await postData(`/orders/${userId}`, orderData);
            if (result) {
                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
