<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Контакти</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Зворотний зв'язок</h1>
                    <p>Зв'яжіться з нами для підтримки або пропозицій</p>
                </div>
            </header>

            <div class="grid">
                <div class="card animate">
                    <h3 class="card-title">Контактна інформація</h3>
                    <div style="margin: 1.5rem 0;">
                        <div style="display: flex; gap: 15px; margin-bottom: 1rem;">
                            <i class="fas fa-map-marker-alt" style="color: var(--primary);"></i>
                            <span>м. Київ, вул. Університетська, 1</span>
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom: 1rem;">
                            <i class="fas fa-phone" style="color: var(--primary);"></i>
                            <span>+380 44 123 45 67</span>
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom: 1rem;">
                            <i class="fas fa-envelope" style="color: var(--primary);"></i>
                            <span>support@devsystem.com</span>
                        </div>
                    </div>
                    <div class="social-links" style="display: flex; gap: 15px; font-size: 1.5rem; color: var(--primary);">
                        <i class="fab fa-facebook-square"></i>
                        <i class="fab fa-linkedin"></i>
                        <i class="fab fa-github"></i>
                    </div>
                </div>

                <div class="card animate">
                    <h3 class="card-title">Напишіть нам</h3>
                    <form onsubmit="event.preventDefault(); showNotification('Повідомлення надіслано!'); this.reset();">
                        <div class="form-group">
                            <label>Ваше ім'я</label>
                            <input type="text" placeholder="Ім'я" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="example@mail.com" required>
                        </div>
                        <div class="form-group">
                            <label>Повідомлення</label>
                            <textarea rows="3" placeholder="Ваше запитання..."></textarea>
                        </div>
                        <button class="btn btn-primary" style="width: 100%;">Надіслати</button>
                    </form>
                </div>
            </div>

            <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted);">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
