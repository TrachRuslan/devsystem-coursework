<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новий користувач | Система управління</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>

    <div class="main-wrapper">
        <header>
            <div class="page-title">
                <h1>Створити користувача</h1>
                <p>Додавання нового клієнта в базу даних</p>
            </div>
            <a href="users.html" class="btn btn-secondary btn-sm" style="background: var(--text-muted); color: white;">
                <i class="fas fa-arrow-left"></i> Назад до списку
            </a>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form id="createUserForm">
                <div class="form-group">
                    <label for="name">Повне ім'я</label>
                    <input type="text" id="name" placeholder="Іван Іванов" required>
                </div>
                <div class="form-group">
                    <label for="email">Email адреса</label>
                    <input type="email" id="email" placeholder="ivan@example.com" required>
                </div>
                <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                    <div class="form-group">
                        <label for="age">Вік</label>
                        <input type="number" id="age" placeholder="25" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="phone">Номер телефону</label>
                        <input type="tel" id="phone" placeholder="+380..." required>
                    </div>
                </div>
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        <i class="fas fa-save"></i> Зберегти користувача
                    </button>
                </div>
            </form>
        </div>

        <footer>
            <p>&copy; 2026 Система управління | Курсова робота</p>
        </footer>
    </div>

    <div id="notification"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value),
                phoneNumber: document.getElementById('phone').value
            };
            
            const result = await postData('/users', userData);
            if (result) {
                setTimeout(() => {
                    window.location.href = 'users.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
