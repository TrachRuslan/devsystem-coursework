<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Створити користувача</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Новий користувач</h1>
                    <p>Додайте дані клієнта до бази даних</p>
                </div>
                <div class="header-actions animate">
                    <a href="users.html" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> До списку
                    </a>
                </div>
            </header>

            <div class="form-container animate">
                <form id="create-user-form">
                    <div class="form-group">
                        <label for="name">Повне ім'я</label>
                        <input type="text" id="name" name="name" placeholder="Іван Іванов" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Електронна пошта</label>
                        <input type="email" id="email" name="email" placeholder="ivan@example.com" required>
                    </div>
                    <div class="grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="form-group">
                            <label for="age">Вік</label>
                            <input type="number" id="age" name="age" min="18" max="100" value="20" required>
                        </div>
                        <div class="form-group">
                            <label for="phoneNumber">Телефон</label>
                            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+380...">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i class="fas fa-user-plus"></i> Зареєструвати клієнта
                    </button>
                </form>
            </div>

            <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted);">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
