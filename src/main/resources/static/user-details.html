<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Деталі користувача</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Профіль клієнта</h1>
                    <p>Детальна інформація та історія замовлень</p>
                </div>
                <div class="header-actions animate">
                    <a href="users.html" class="btn btn-outline">
                        <i class="fas fa-arrow-left"></i> Назад
                    </a>
                </div>
            </header>

            <div class="grid">
                <div class="card animate">
                    <h3 class="card-title">Особисті дані</h3>
                    <div id="user-info" style="margin-top: 1rem;">
                        <p>Завантаження інформації...</p>
                    </div>
                </div>

                <div class="card animate">
                    <h3 class="card-title">Створити замовлення</h3>
                    <form id="create-order-form">
                        <div class="form-group">
                            <label>Назва товару/послуги</label>
                            <input type="text" name="title" required placeholder="Напр. Курс JS">
                        </div>
                        <div class="form-group">
                            <label>Ціна (₴)</label>
                            <input type="number" name="price" required placeholder="0.00" step="0.01">
                        </div>
                        <button class="btn btn-primary" style="width: 100%;">Створити замовлення</button>
                    </form>
                </div>
            </div>

            <div class="card animate" style="margin-top: 2rem;">
                <h3 class="card-title">Історія замовлень</h3>
                <div id="user-orders-table">
                    <p>Немає замовлень.</p>
                </div>
            </div>

            <footer class="main-footer animate">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
                <div class="footer-links">
                    <a href="about.html">Про проект</a>
                    <a href="contacts.html">Контакти</a>
                </div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            if (!userId) return;

            // Load User Data
            const user = await fetchData(`/users`); 
            const currentUser = user.find(u => u.id == userId);
            
            if (currentUser) {
                document.getElementById('user-info').innerHTML = `
                    <div style="margin-bottom: 0.5rem;">Ім'я: <strong>${currentUser.name}</strong></div>
                    <div style="margin-bottom: 0.5rem;">Email: <strong>${currentUser.email}</strong></div>
                    <div style="margin-bottom: 0.5rem;">Телефон: <strong>${currentUser.phoneNumber || '-'}</strong></div>
                    <div style="margin-bottom: 0.5rem;">Вік: <strong>${currentUser.age}</strong></div>
                `;
            }

            // Load Orders
            const loadOrders = async () => {
                const orders = await fetchData(`/orders/${userId}`);
                if (orders && orders.length > 0) {
                    document.getElementById('user-orders-table').innerHTML = `
                        <div class="table-container" style="box-shadow: none;">
                            <table style="width: 100%;">
                                <thead>
                                    <tr>
                                        <th>Товар</th>
                                        <th>Ціна</th>
                                        <th>Дії</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${orders.map(o => `
                                        <tr>
                                            <td>${o.title}</td>
                                            <td>${o.price} ₴</td>
                                            <td>
                                                <button class="btn btn-danger btn-sm" onclick="deleteOrderLocally(${o.id})">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }
            };
            loadOrders();

            window.deleteOrderLocally = (id) => {
                showConfirm('Видалити замовлення?', async () => {
                    await fetch(`${API_URL}/orders/${id}`, { method: 'DELETE' });
                    showNotification('Замовлення видалено');
                    loadOrders();
                });
            };

            // Order Form
            document.getElementById('create-order-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                
                const res = await fetch(`${API_URL}/orders/${userId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showNotification('Замовлення успішно створено');
                    e.target.reset();
                    loadOrders();
                }
            });
        });
    </script>
</body>
</html>
