<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSystem | Замовлення</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header>
                <div class="page-title animate">
                    <h1>Керування замовленнями</h1>
                    <p>Моніторинг продажів та виконання запитів</p>
                </div>
            </header>

            <div class="search-container animate">
                <i class="fas fa-search"></i>
                <input type="text" id="search-orders" placeholder="Пошук замовлень...">
            </div>

            <div id="orders-list" class="animate">
                <!-- Замовлення завантажуються динамічно -->
                <p>Завантаження замовлень...</p>
            </div>

            <footer class="main-footer animate">
                <p>&copy; 2026 DevSystem - Курсова робота з Веб-технологій - Трач Руслан</p>
                <div class="footer-links">
                    <a href="about.html">Про проект</a>
                    <a href="contacts.html">Контакти</a>
                </div>
            </footer>
        </main>
    </div>

    <div id="notification"></div>
    <script src="app.js"></script>
</body>
</html>
